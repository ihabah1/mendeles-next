{% extends "portal/base.html" %}
{% block title %}{{ title }} — Mandeles{% endblock %}
{% block content %}
<h1 class="page-title">{{ title }}</h1>
<div class="card" style="max-width:520px;">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}<div class="form-errors">{{ field.errors.0 }}</div>{% endif %}
    {% endfor %}
    <div class="actions-row">
      <button type="submit" class="btn btn-gold">שמור</button>
      <a href="{% url 'portal:customers' %}" class="btn btn-outline">ביטול</a>
    </div>
  </form>
</div>
{% endblock %}
